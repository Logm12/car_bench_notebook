# GHCR full test-set scenario for a published baseline LiteLLM agent image.
# Replace the agent_under_test image with your published image before running.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
image = "ghcr.io/yourusername/car-bench-track-1-agent-under-test:latest"
env = { ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", OPENAI_API_KEY = "${OPENAI_API_KEY:-}", AGENT_LLM = "${AGENT_LLM:-gpt-4o-mini}", AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
user_model = "gpt-4o-mini"
user_provider = "openai"
policy_evaluator_model = "gpt-4o-mini"
policy_evaluator_provider = "openai"
