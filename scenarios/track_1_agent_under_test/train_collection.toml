# Scenario for collecting all training trajectories.
# Runs all tasks from the CAR-bench train split.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = ".venv/Scripts/python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = ".venv/Scripts/python src/track_1_agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm gpt-4o-mini --temperature 0.0"

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 50
tasks_hallucination_num_tasks = 48
tasks_disambiguation_num_tasks = 31
max_steps = 50
user_model = "gpt-4o-mini"
user_provider = "openai"
policy_evaluator_model = "gpt-4o-mini"
policy_evaluator_provider = "openai"
